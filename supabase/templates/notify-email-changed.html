<!DOCTYPE html>
<html lang="pt">
<head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/></head>
<body style="margin:0;padding:0;background:#f4f4f4;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;">
  <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f4f4;padding:24px 12px;">
    <tr><td align="center">
      <table role="presentation" width="100%" style="max-width:560px;background:#fff;border-radius:12px;border:1px solid #e8e8e8;overflow:hidden;">
        <tr><td style="padding:20px 24px;background:#078c7a;color:#fff;font-size:18px;font-weight:700;">Email da conta alterado — TerraPlace</td></tr>
        <tr><td style="padding:24px;color:#333;font-size:15px;line-height:1.6;">
          <p>Olá,</p>
          <p>O email da tua conta foi alterado de <strong>{{ .OldEmail }}</strong> para <strong>{{ .Email }}</strong>.</p>
          <p style="font-size:13px;color:#888;">Se não reconheces esta alteração, contacta <a href="mailto:contacto@terraplace.pt" style="color:#078c7a;">contacto@terraplace.pt</a>.</p>
        </td></tr>
        <tr><td style="padding:16px 24px 24px;color:#888;font-size:12px;border-top:1px solid #eee;">TerraPlace</td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
